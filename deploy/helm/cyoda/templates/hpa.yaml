{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cyoda.fullname" . }}
  labels:
    {{- include "cyoda.labels" . | nindent 4 }}
spec:
  # Targets the StatefulSet so scale changes propagate to the cluster
  # via the same "replicas" knob operators use manually. cyoda's
  # cluster-mode gossip handles membership convergence as new pod IDs
  # (cyoda-0, cyoda-1, …) appear and disappear.
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: {{ include "cyoda.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  {{- with .Values.autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
