{{- /*
  Bootstrap is opt-in. Render only when bootstrap.clientId is set AND
  no existingSecret was provided. The binary's coupled predicate (jwt
  mode: ID and Secret both set OR both empty) means there is no
  bootstrap credential to manage when clientId is empty.
*/ -}}
{{- if and .Values.bootstrap.clientId (not .Values.bootstrap.clientSecret.existingSecret) }}
{{- $name := printf "%s-bootstrap" (include "cyoda.fullname" .) }}
{{- $key  := .Values.bootstrap.clientSecret.existingSecretKey }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $name) }}
{{- if not $existing }}
  {{- $ns := (lookup "v1" "Namespace" "" .Release.Namespace) }}
  {{- if not $ns }}
    {{- fail "bootstrap.clientSecret.existingSecret is required when bootstrap.clientId is set and the chart is rendered without live cluster access (helm template, Argo CD, --dry-run, or a namespace that does not yet exist — e.g. first-time 'helm install --create-namespace'). Fix: (a) kubectl create namespace <ns> first; (b) pre-create the bootstrap Secret and set bootstrap.clientSecret.existingSecret; (c) use external-secrets-operator; or (d) leave bootstrap.clientId empty to disable bootstrap entirely. See the chart README > 'Using with GitOps'." }}
  {{- end }}
{{- end }}
{{- $value := "" }}
{{- if $existing }}
{{- $value = index $existing.data $key }}
{{- else }}
{{- $value = randAlphaNum 48 | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "cyoda.labels" . | nindent 4 }}
type: Opaque
data:
  {{ $key }}: {{ $value | quote }}
{{- end }}
