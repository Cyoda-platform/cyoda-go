{{- /*
  Bearer token used to authenticate Prometheus scrapes of /metrics on the
  admin listener. The same Secret is mounted into the cyoda pod (via the
  projected-volume) and referenced by the ServiceMonitor's
  bearerTokenSecret block, so Prometheus authenticates transparently.

  Generation pattern matches secret-hmac.yaml: if operator provided
  existingSecret, do nothing; otherwise look up, reuse on re-render, or
  generate a fresh token on first install. The GitOps-safety guard
  (namespace-lookup sentinel) prevents Argo CD / helm template / --dry-run
  paths from silently re-rotating the credential.

  The generated value is a 48-character alphanumeric (~285 bits of
  entropy — credible for a long-lived static bearer; operators who
  rotate can set monitoring.metricsBearer.existingSecret and manage
  lifecycle themselves).
*/}}
{{- if not .Values.monitoring.metricsBearer.existingSecret }}
{{- $name := printf "%s-metrics-bearer" (include "cyoda.fullname" .) }}
{{- $key  := .Values.monitoring.metricsBearer.existingSecretKey }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $name) }}
{{- if not $existing }}
  {{- $ns := (lookup "v1" "Namespace" "" .Release.Namespace) }}
  {{- if not $ns }}
    {{- fail "monitoring.metricsBearer.existingSecret is required when the chart is rendered without live cluster access (helm template, Argo CD, --dry-run, or a namespace that does not yet exist — e.g. first-time 'helm install --create-namespace'). Fix: (a) kubectl create namespace <ns> first; (b) pre-create the metrics-bearer Secret and set monitoring.metricsBearer.existingSecret; or (c) use external-secrets-operator. See the chart README > 'Using with GitOps'." }}
  {{- end }}
{{- end }}
{{- $value := "" }}
{{- if $existing }}
{{- $value = index $existing.data $key }}
{{- else }}
{{- $value = randAlphaNum 48 | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "cyoda.labels" . | nindent 4 }}
type: Opaque
data:
  {{ $key }}: {{ $value | quote }}
{{- end }}
