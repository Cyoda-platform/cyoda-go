{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cyoda.serviceAccountName" . }}
  labels:
    {{- include "cyoda.labels" . | nindent 4 }}
  # The migrate Job is a pre-install/pre-upgrade Helm hook and references
  # this ServiceAccount by name. By default, hooks run before normal
  # chart resources — so the Job's pod fails with "serviceaccount not
  # found" unless the SA is also a hook that runs earlier. Dual
  # install,upgrade (not pre-*) + hook-weight -10 renders the SA on
  # every install and upgrade, ahead of the migrate Job (default weight
  # 0). before-hook-creation,hook-succeeded keeps the SA cleanup
  # symmetric with the Job's and re-creates on upgrade.
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: false
{{- end }}
