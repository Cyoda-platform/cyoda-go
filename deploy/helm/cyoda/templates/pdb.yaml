{{- /* Render the PDB when either a multi-replica static deployment OR an
       autoscaling range that can produce multiple replicas. Without the
       second clause, an operator with replicas=1 + autoscaling.enabled +
       maxReplicas>=2 would run multiple pods with no PDB. */}}
{{- $multiStatic := gt (int .Values.replicas) 1 }}
{{- $multiAuto := and .Values.autoscaling.enabled (gt (int .Values.autoscaling.maxReplicas) 1) }}
{{- if and .Values.podDisruptionBudget.enabled (or $multiStatic $multiAuto) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "cyoda.fullname" . }}
  labels:
    {{- include "cyoda.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "cyoda.selectorLabels" . | nindent 6 }}
{{- end }}
