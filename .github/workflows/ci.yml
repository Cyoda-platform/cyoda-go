name: CI

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -v

      - name: Run tests with race detector
        run: go test -race ./...

      - name: Build
        run: go build -o bin/cyoda-go ./cmd/cyoda-go
