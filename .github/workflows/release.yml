name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write    # GitHub Release + tag annotations
  packages: write    # GHCR push
  id-token: write    # keyless cosign via OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Pre-flight: verify that no plugin dependency resolves to a pseudo-version
      # or an unreleased SHA, and that no replace directive is in effect.
      # Either condition means the release build would use non-published code,
      # which breaks reproducibility for downstream consumers.
      - name: Pre-flight — verify module dependencies
        run: |
          set -euo pipefail
          GOWORK=off go mod download
          GOWORK=off go mod verify
          echo "Plugin dependency versions pinned by go.mod:"
          GOWORK=off go list -m github.com/cyoda-platform/cyoda-go/plugins/... || true

          # Reject pseudo-versions (all three forms defined by go help pseudo-versions):
          #   1. vX.0.0-<date>-<sha>
          #   2. vX.Y.Z-pre.0.<date>-<sha>
          #   3. vX.Y.(Z+1)-0.<date>-<sha>
          # Pattern: optional -<prerelease> segment, then -<14 digits>-<12 hex>.
          if GOWORK=off go list -m all | grep -E '[[:space:]]v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?-[0-9]{14}-[0-9a-f]{12}'; then
            echo ""
            echo "ERROR: pseudo-version found in go.mod."
            echo "All plugin dependencies must resolve to published git tags."
            echo "Tag the plugin module, then run 'go get <module>@<tag>' in the root module and commit."
            exit 1
          fi

          # Reject replace directives that would divert the build to local paths.
          # Ignore commented-out lines.
          if grep -nE '^[[:space:]]*replace[[:space:]]' go.mod | grep -v '^[[:space:]]*//'; then
            echo ""
            echo "ERROR: replace directive(s) found in go.mod."
            echo "Release builds must use published modules only. Remove replaces with:"
            echo "  go mod edit -dropreplace <module>"
            echo "then 'go mod tidy' and commit before tagging."
            exit 1
          fi

      - name: Guard — Dockerfile must exist
        run: |
          if [ ! -f deploy/docker/Dockerfile ]; then
            echo "ERROR: deploy/docker/Dockerfile not found."
            echo "The canonical Dockerfile is produced by the Docker per-target plan."
            echo "A v* release tag cannot be built until that artifact lands. Aborting."
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - uses: anchore/sbom-action/download-syft@v0

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOWORK: "off"
