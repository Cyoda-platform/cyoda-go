name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write    # GitHub Release + tag annotations
  packages: write    # GHCR push
  id-token: write    # keyless cosign via OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Pre-flight: verify that no plugin dependency resolves to a pseudo-version
      # or unreleased SHA. Prevents an accidental root tag from producing a
      # release built against unreleased plugin code.
      - name: Pre-flight — verify module dependencies
        run: |
          set -euo pipefail
          GOWORK=off go mod download
          GOWORK=off go mod verify
          echo "Plugin dependency versions pinned by go.mod:"
          GOWORK=off go list -m github.com/cyoda-platform/cyoda-go/plugins/... || true
          if GOWORK=off go list -m all | grep -E "v0\.0\.0-[0-9]{14}-[0-9a-f]{12}"; then
            echo "ERROR: pseudo-versions found in go.mod — all plugin deps must resolve to published tags"
            exit 1
          fi

      - name: Guard — Dockerfile must exist
        run: |
          if [ ! -f deploy/docker/Dockerfile ]; then
            echo "ERROR: deploy/docker/Dockerfile not found."
            echo "The canonical Dockerfile is produced by the Docker per-target plan."
            echo "A v* release tag cannot be built until that artifact lands. Aborting."
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - uses: anchore/sbom-action/download-syft@v0

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOWORK: "off"
