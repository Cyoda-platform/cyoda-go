name: Docker Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Custom image tag (default: <branch>-<sha>)'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag_override }}" ]]; then
            echo "tag=${{ inputs.tag_override }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "also_latest=true" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            SHORT_SHA="$(git rev-parse --short HEAD)"
            echo "tag=main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "also_main=true" >> "$GITHUB_OUTPUT"
          else
            BRANCH="$(echo "${GITHUB_REF#refs/heads/}" | tr '/' '-')"
            SHORT_SHA="$(git rev-parse --short HEAD)"
            echo "tag=${BRANCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Nexus
        env:
          NEXUS_PASSWORD: ${{ secrets.DOCKER_NEXUS_PASSWORD }}
        run: echo "${NEXUS_PASSWORD}" | docker login "${{ vars.DOCKER_NEXUS_REGISTRY }}" -u "${{ vars.DOCKER_NEXUS_USERNAME }}" --password-stdin

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        run: |
          REGISTRY="${{ vars.DOCKER_NEXUS_REGISTRY }}"
          TAG="${{ steps.tag.outputs.tag }}"
          IMAGE="${REGISTRY}/cyoda/cyoda-go"

          TAGS="--tag ${IMAGE}:${TAG}"
          if [[ "${{ steps.tag.outputs.also_latest }}" == "true" ]]; then
            TAGS="${TAGS} --tag ${IMAGE}:latest"
          fi
          if [[ "${{ steps.tag.outputs.also_main }}" == "true" ]]; then
            TAGS="${TAGS} --tag ${IMAGE}:main"
          fi

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VERSION="${TAG}" \
            --build-arg COMMIT="${{ github.sha }}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            ${TAGS} \
            --push \
            .
