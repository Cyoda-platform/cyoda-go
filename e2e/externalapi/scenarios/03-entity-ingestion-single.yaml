scenarios:
  - id: ingest-single/01-success-path
    name: Create one entity against a locked single-field model
    source_test: integration-tests/src/test/kotlin/net/cyoda/saas/entity/EntityInteractorIT.kt#success path
    description: |
      Register a simple model `{"key1": 123}`, lock it, then POST one
      entity. Exactly one entity must be readable afterwards and the model
      simple-view export must report `.key1 = INTEGER`.
    data:
      model: { name: simple1, version: 1 }
      sample_json: |
        {"key1": 123}
    steps:
      - action: create_model_from_sample
        endpoint: { rest: POST /model/import/JSON/SAMPLE_DATA/simple1/1 }
        body_ref: data.sample_json
      - action: lock_model
        endpoint: { rest: PUT /model/simple1/1/lock }
      - action: create_entity
        endpoint:
          rest: POST /entity/JSON/simple1/1
          grpc: EntityService.entityManage (EntityCreateRequest)
        body_ref: data.sample_json
        capture: entityId
    assertions:
      - type: entity_count_for_model
        model: { name: simple1, version: 1 }
        value: 1
      - type: json_equals
        target: simpleView
        expected: |
          { "$": { ".key1": "INTEGER" } }

  - id: ingest-single/02-import-list-of-objects-in-one-call
    name: POST a JSON array of objects creates one entity per element
    source_test: integration-tests/src/test/kotlin/net/cyoda/saas/entity/EntityInteractorIT.kt#try to import list of objects
    description: |
      The single-model create endpoint accepts either an object or a JSON
      array of objects. Posting a 2-element array creates 2 entities.
    data:
      model: { name: simple2, version: 1 }
      sample_json: |
        [
          {"key": 123},
          {"key": 456}
        ]
    steps:
      - action: create_model_from_sample
        endpoint: { rest: POST /model/import/JSON/SAMPLE_DATA/simple2/1 }
        body_ref: data.sample_json
      - action: lock_model
        endpoint: { rest: PUT /model/simple2/1/lock }
      - action: create_entity
        endpoint: { rest: POST /entity/JSON/simple2/1 }
        body_ref: data.sample_json
    assertions:
      - type: entity_count_for_model
        model: { name: simple2, version: 1 }
        value: 2

  - id: ingest-single/03-all-fields-model-round-trip
    name: Register and ingest the "all fields" model and round-trip equality
    source_test: integration-tests/src/test/kotlin/net/cyoda/saas/entity/EntityInteractorIT.kt#testSaveAllFieldsModel
    description: |
      Register a model generated by `RandomAllFieldsGenerator` that covers
      every supported field type, lock it, save one entity, then read it
      back. The reconstructed JSON must equal the submitted JSON (after
      alphabetic field sorting).
    data:
      model: { name: allFields, version: 1 }
      sample_json_ref: "generator:RandomAllFieldsGenerator (alphabetically sorted)"
    steps:
      - action: create_model_from_sample
        endpoint: { rest: POST /model/import/JSON/SAMPLE_DATA/allFields/1 }
        body_ref: data.sample_json_ref
      - action: lock_model
        endpoint: { rest: PUT /model/allFields/1/lock }
      - action: create_entity
        endpoint: { rest: POST /entity/JSON/allFields/1 }
        body_ref: data.sample_json_ref
        capture: entityId
      - action: get_entity
        endpoint: { rest: GET /entity/{entityId} }
        capture: readBack
    assertions:
      - type: entity_equals_json
        target: readBack
        expected_ref: data.sample_json_ref
      - type: consistency_state
        value: READY

  - id: ingest-single/04-save-family-rich-nested-array
    name: Register and ingest a "family" entity containing nested array members
    source_test: integration-tests/src/test/kotlin/net/cyoda/saas/entity/EntityInteractorIT.kt#testSavingFamily
    description: |
      Register the `family` model from an array of mixed family-member
      objects (parents, children, grandchildren). Lock, ingest, then assert
      that each object yields one entity (tree-node mode) and read-back
      equals the sorted input.
    data:
      model: { name: family, version: 1 }
      sample_json: |
        [
          {"name":"Father","age":50,"relation":"FATHER"},
          {"name":"Daughter","age":20,"relation":"DAUGHTER"},
          {"name":"Son","age":18,"relation":"SON"},
          {"name":"GrandDaughter","age":2,"relation":"GRANDDAUGHTER"},
          {"name":"GrandSon","age":1,"relation":"GRANDSON"}
        ]
    steps:
      - action: create_model_from_sample
        endpoint: { rest: POST /model/import/JSON/SAMPLE_DATA/family/1 }
        body_ref: data.sample_json
      - action: lock_model
        endpoint: { rest: PUT /model/family/1/lock }
      - action: create_entity
        endpoint: { rest: POST /entity/JSON/family/1 }
        body_ref: data.sample_json
      - action: get_all_entities
        endpoint: { rest: GET /entity/family/1 }
        capture: familyEntities
    assertions:
      - type: list_size
        target: familyEntities
        value: 5

  - id: ingest-single/05-grpc-create-entity
    name: Create one entity via gRPC unary entityManage
    source_test: integration-tests/src/test/kotlin/net/cyoda/saas/entity/EntityGrpcApiIT.kt#test create entity successfully
    description: |
      The gRPC `entityManage` unary endpoint with an `EntityCreateRequest`
      creates one entity. The server returns the created entity's id.
    data:
      model: { name: simple1, version: 1 }
      sample_json: |
        {"k1": 1}
    steps:
      - action: create_model_from_sample
        endpoint: { rest: POST /model/import/JSON/SAMPLE_DATA/simple1/1 }
        body_ref: data.sample_json
      - action: lock_model
        endpoint: { rest: PUT /model/simple1/1/lock }
      - action: create_entity
        endpoint: { grpc: EntityService.entityManage (EntityCreateRequest) }
        body_ref: data.sample_json
        capture: entityId
    assertions:
      - type: entity_count_for_model
        model: { name: simple1, version: 1 }
        value: 1
      - type: uuid_format
        target: entityId

  - id: ingest-single/06-grpc-multiple-entities-single-endpoint-warning
    name: Posting multiple entities through the single-entity gRPC endpoint produces a warning
    source_test: integration-tests/src/test/kotlin/net/cyoda/saas/entity/EntityGrpcApiIT.kt#test multiple entities by one request ona single endpoint generates warning
    description: |
      When the caller sends an array to the single-entity gRPC RPC, the
      server returns a warning-level response but still creates the entities.
    data:
      model: { name: simple1, version: 1 }
      sample_json: |
        [{"k1": 1}, {"k1": 2}]
    steps:
      - action: create_entity
        endpoint: { grpc: EntityService.entityManage (EntityCreateRequest) }
        body_ref: data.sample_json
    assertions:
      - type: response_contains_warning
        pattern: "multiple entities.*single"
