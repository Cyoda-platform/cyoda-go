# .goreleaser.yaml
# Build configuration for cyoda-go releases. Triggered by the release.yml
# workflow on v* tags.

version: 2

project_name: cyoda

before:
  hooks:
    - env GOWORK=off go mod download
    - env GOWORK=off go mod verify

builds:
  - id: cyoda
    main: ./cmd/cyoda
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}

archives:
  - id: cyoda
    ids: [cyoda]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

nfpms:
  - id: cyoda
    package_name: cyoda
    vendor: Cyoda Platform
    homepage: https://github.com/cyoda-platform/cyoda-go
    maintainer: Cyoda Platform <noreply@cyoda.com>
    description: Lightweight Go EDBMS — digital twin of the Cyoda platform.
    license: Apache-2.0
    formats: [deb, rpm]
    bindir: /usr/bin
    file_name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: scripts/packaging/cyoda.env
        dst: /etc/cyoda/cyoda.env
        type: "config|noreplace"

brews:
  - name: cyoda
    repository:
      owner: cyoda-platform
      name: homebrew-cyoda-go
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/cyoda-platform/cyoda-go
    description: Lightweight Go EDBMS — digital twin of the Cyoda platform.
    license: Apache-2.0
    commit_author:
      name: cyoda-platform-release-bot
      email: noreply@cyoda.com
    install: |
      bin.install "cyoda"
    test: |
      system "#{bin}/cyoda", "--help"
    post_install: |
      system "#{bin}/cyoda", "init"
    caveats: |
      ==============================================================
      cyoda is configured to use sqlite with data stored in
      #{ENV["HOME"]}/.local/share/cyoda/cyoda.db

      If you want to reconfigure, run:
        cyoda init --force

      Or set CYODA_STORAGE_BACKEND in your shell environment to
      override the packaged default.
      ==============================================================

checksum:
  name_template: 'SHA256SUMS'
  algorithm: sha256

dockers:
  - image_templates:
      - "ghcr.io/cyoda-platform/cyoda:{{ .Version }}-amd64"
    use: buildx
    goarch: amd64
    dockerfile: deploy/docker/Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/cyoda-platform/cyoda-go"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  - image_templates:
      - "ghcr.io/cyoda-platform/cyoda:{{ .Version }}-arm64"
    use: buildx
    goarch: arm64
    dockerfile: deploy/docker/Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/cyoda-platform/cyoda-go"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

docker_manifests:
  - name_template: "ghcr.io/cyoda-platform/cyoda:{{ .Version }}"
    image_templates:
      - "ghcr.io/cyoda-platform/cyoda:{{ .Version }}-amd64"
      - "ghcr.io/cyoda-platform/cyoda:{{ .Version }}-arm64"
  - name_template: "ghcr.io/cyoda-platform/cyoda:latest"
    skip_push: '{{ .Prerelease }}'
    image_templates:
      - "ghcr.io/cyoda-platform/cyoda:{{ .Version }}-amd64"
      - "ghcr.io/cyoda-platform/cyoda:{{ .Version }}-arm64"

docker_signs:
  - artifacts: manifests
    cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "${artifact}"

sboms:
  - artifacts: archive

release:
  prerelease: auto
  draft: false
