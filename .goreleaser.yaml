# .goreleaser.yaml
# Build configuration for cyoda-go releases. Triggered by the release.yml
# workflow on v* tags.

version: 2

project_name: cyoda

before:
  hooks:
    - env GOWORK=off go mod download
    - env GOWORK=off go mod verify

builds:
  - id: cyoda
    main: ./cmd/cyoda
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}

archives:
  - id: cyoda
    ids: [cyoda]
    # Archive contents are flat at the top level (no wrapping subdir). scripts/install.sh
    # relies on this shape when extracting the binary; pin it explicitly so a future
    # GoReleaser default change doesn't silently break the installer.
    wrap_in_directory: false
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

nfpms:
  - id: cyoda
    package_name: cyoda
    vendor: Cyoda Platform
    homepage: https://github.com/cyoda-platform/cyoda-go
    maintainer: Cyoda Platform <noreply@cyoda.com>
    description: Lightweight Go EDBMS — digital twin of the Cyoda platform.
    license: Apache-2.0
    formats: [deb, rpm]
    bindir: /usr/bin
    file_name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: scripts/packaging/cyoda.env
        dst: /etc/cyoda/cyoda.env
        type: "config|noreplace"

# Intentionally using `brews:` despite deprecation warning.
# cyoda is a CLI (not a .app), supports Linux Homebrew, and relies on
# formula post_install hooks. Revisit if GoReleaser v3 removes `brews:`.
brews:
  - name: cyoda
    # Skip tap upload on prerelease tags (v*-rc.*, v*-beta.*, v*-alpha.*).
    # Snapshots never upload regardless (snapshot mode short-circuits
    # publishers). Stable tags (v0.1.0) commit to the tap as usual. Matches
    # the :latest image-tag policy and the bump-chart-appversion prerelease
    # filter.
    skip_upload: auto
    repository:
      owner: cyoda-platform
      name: homebrew-cyoda-go
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/cyoda-platform/cyoda-go
    description: Lightweight Go EDBMS — digital twin of the Cyoda platform.
    license: Apache-2.0
    commit_author:
      name: cyoda-platform-release-bot
      email: noreply@cyoda.com
    install: |
      bin.install "cyoda"
    test: |
      system "#{bin}/cyoda", "--help"
    post_install: |
      system "#{bin}/cyoda", "init"
    caveats: |
      ==============================================================
      cyoda is configured to use sqlite with data stored in
      #{ENV["HOME"]}/.local/share/cyoda/cyoda.db

      If you want to reconfigure, run:
        cyoda init --force

      Or set CYODA_STORAGE_BACKEND in your shell environment to
      override the packaged default.
      ==============================================================

checksum:
  name_template: 'SHA256SUMS'
  algorithm: sha256

dockers_v2:
  - id: cyoda
    images:
      - ghcr.io/cyoda-platform/cyoda
    tags:
      - "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: deploy/docker/Dockerfile
    labels:
      org.opencontainers.image.source: https://github.com/cyoda-platform/cyoda-go
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .Commit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.licenses: Apache-2.0

  - id: cyoda-latest
    images:
      - ghcr.io/cyoda-platform/cyoda
    tags:
      - latest
    # `:latest` tracks stable releases only — skip for prereleases.
    # In goreleaser v2 the dockers_v2 equivalent of v1's skip_push is
    # `disable` (truthy template string disables the whole image).
    disable: "{{ .Prerelease }}"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: deploy/docker/Dockerfile
    labels:
      org.opencontainers.image.source: https://github.com/cyoda-platform/cyoda-go
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .Commit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.licenses: Apache-2.0

docker_signs:
  # `dockers_v2` produces per-arch `Docker Image` artifacts (one per
  # platform — linux/amd64, linux/arm64, ...). There is no separate
  # `docker_manifests:` block and the v2 publish path assembles the
  # multi-arch manifest list transparently from those per-arch images.
  # Sign the images themselves: cosign signs each per-arch digest,
  # multi-arch pulls resolve to a signed image, and the snapshot smoke
  # can verify the signer's selector resolves non-empty.
  - artifacts: images
    cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "${artifact}"

sboms:
  - artifacts: archive

release:
  prerelease: auto
  draft: false
